<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
		body{
			background: url('static/images/1.jpg');
			background-size:cover;
		}
        label {
            font-weight: bold;
            font-size: 18px;
            color:blue;
            padding: 10px;
        }
        h1{
            font-weight: bold;
            font-size: 36px;
            color:#B2074B;
        }
        input[type="text"], [type="password"]
        {
            padding:10px;
            width:250px;
            height:20px;
        }
        input[type="submit"]
        {
            width:150px;
            height:40px;
            padding:5px;
            font-size: 18px;
            border:none;
            outline:none;
            background-color: rgb(2, 2, 78);
            color:#FFF;
            border-radius: 5px;

        }
		.divlogin
		{
			margin:0;
			width:500px;
			height:auto;
			border:0;
			border-radius:10px;
			background:rgba(255,255,255,0.7);
			
			margin-left:400px;
			padding: 15px;
		}
    </style>
</head>
<body>
    <div style="width:100%;height:30%;padding:15px">
        <h3><span style="font-weight: bolder;color:#fff;font-size: 28px;">Face Anti-Spoofing Detection</span></h3>
     </div>
     <div align="center" class="divlogin">
    <h1>Register</h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{{ url_for('register') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required><br><br>
        <label for="mobile">Mobile</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <input type="text" id="mobile" name="mobile" required><br><br>
        <label for="email">Email</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <input type="text" id="email" name="email" required><br><br>
        <input type="submit" value="Register">
    </form>
    <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</body>
</html>
